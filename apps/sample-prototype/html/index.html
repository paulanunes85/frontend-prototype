<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype MVP — Choose Framework</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container {
      background: white; border-radius: 16px; padding: 60px 40px;
      max-width: 800px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; color: #333; }
    .subtitle { color: #666; font-size: 1.1rem; margin-bottom: 40px; }
    .links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .links a {
      display: inline-block; padding: 20px 40px;
      background: #0078D4; color: white; text-decoration: none;
      border-radius: 8px; font-size: 1.2rem; font-weight: 600;
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,120,212,0.3);
    }
    .links a:hover { background: #005A9E; transform: translateY(-2px); }
    .badge {
      display: inline-block; background: #28a745; color: white;
      padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; margin-bottom: 20px;
    }
    .docs { margin-top: 40px; }
    .docs a { color: #0078D4; text-decoration: none; font-weight: 500; }
    .expiry { margin-top: 24px; color: #999; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Generated by Foundry Agents</div>
    <h1>Sales Dashboard</h1>
    <p class="subtitle">Choose your preferred framework to view the prototype</p>
    <div class="links">
      <a href="./react/">React Version</a>
      <a href="./vue/">Vue Version</a>
    </div>
    <div class="docs"><a href="./docs/">View Documentation</a></div>
    <p class="expiry">This ephemeral environment auto-expires after 72 hours.</p>
  </div>
</body>
</html>
