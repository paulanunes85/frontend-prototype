# CI for the Foundry Prototype Generator project itself (not generated prototypes)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build:mcp

      - name: Build web form
        run: npm run build:form

      - name: Lint
        run: npm run lint
        continue-on-error: true
